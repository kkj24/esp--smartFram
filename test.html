<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Speed Trainer</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #111;
  color: #fff;
}
.container {
  margin-top: 40px;
}
button, input {
  padding: 10px;
  margin: 8px;
  font-size: 16px;
}
#question {
  font-size: 36px;
  margin: 20px;
}
#feedback {
  font-size: 20px;
  height: 24px;
}
.correct { color: #00ff88; }
.wrong { color: #ff4d4d; }
#history {
  margin-top: 20px;
  max-height: 150px;
  overflow-y: auto;
  font-size: 14px;
}
#level {
  font-size: 18px;
  margin-top: 10px;
  color: #ffd700;
}
</style>
</head>
<body>
<div class="container">
  <h1>⚡ Math Speed Trainer</h1>
  <label>Timer (seconds): </label>
  <input type="number" id="timeInput" value="30">
  <br>
  <button onclick="startGame()">Start Game</button>
  <h2 id="timer">Time: 0</h2>
  <div id="level">Level: 1</div>
  <div id="question">Press Start</div>
  <div id="feedback"></div>
  <input type="number" id="answer" placeholder="Your answer" autofocus>
  <h2 id="score">Score: 0</h2>
  <div id="history"></div>
</div>

<script>
let score = 0;
let timeLeft = 0;
let currentAnswer = 0;
let currentQuestionText = "";
let timerInterval;

let level = 1;
let correctStreak = 0;

function generateNumbers() {
  // level scaling
  if (level === 1) return [1 + Math.floor(Math.random()*5), 1 + Math.floor(Math.random()*5)];
  if (level === 2) return [1 + Math.floor(Math.random()*7), 1 + Math.floor(Math.random()*7)];
  if (level === 3) return [1 + Math.floor(Math.random()*9), 1 + Math.floor(Math.random()*9)];
  if (level >= 4) return [2 + Math.floor(Math.random()*10), 2 + Math.floor(Math.random()*10)];
}

function randomQuestion() {
  let [a, b] = generateNumbers();
  currentAnswer = a * b;
  currentQuestionText = `${a} × ${b}`;
  document.getElementById("question").innerText = currentQuestionText;
}

function startGame() {
  score = 0;
  level = 1;
  correctStreak = 0;
  timeLeft = parseInt(document.getElementById("timeInput").value);

  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("history").innerHTML = "";
  document.getElementById("feedback").innerText = "";
  document.getElementById("level").innerText = "Level: 1";

  randomQuestion();
  document.getElementById("answer").focus();

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "Time: " + timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      document.getElementById("question").innerText = "Game Over!";
      document.getElementById("feedback").innerText = "";
    }
  }, 1000);
}

function checkLevelUp() {
  if (correctStreak >= 5) {
    level++;
    correctStreak = 0;
    document.getElementById("level").innerText = "Level: " + level;
  }
}

function submitAnswer() {
  if (timeLeft <= 0) return;

  let userAnswer = document.getElementById("answer").value;
  let feedback = document.getElementById("feedback");
  let history = document.getElementById("history");

  if (parseInt(userAnswer) === currentAnswer) {
    score++;
    correctStreak++;
    timeLeft += 5;

    feedback.innerText = `+5s ✔ Correct (Streak: ${correctStreak})`;
    feedback.className = "correct";

    history.innerHTML = `<div class="correct">${currentQuestionText} = ${userAnswer}</div>` + history.innerHTML;

    checkLevelUp();
  } else {
    correctStreak = 0;
    timeLeft -= 3;

    feedback.innerText = `-3s ✖ Wrong (Answer: ${currentAnswer})`;
    feedback.className = "wrong";

    history.innerHTML = `<div class="wrong">${currentQuestionText} = ${userAnswer} (✔ ${currentAnswer})</div>` + history.innerHTML;
  }

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("answer").value = "";
  document.getElementById("timer").innerText = "Time: " + timeLeft;

  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    document.getElementById("question").innerText = "Game Over!";
    return;
  }

  randomQuestion();
}

// ENTER key support
document.getElementById("answer").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    submitAnswer();
  }
});
</script>
</body>
</html>
